services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn talend_converter.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    depends_on:
      - backend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000/convert
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DATABRICKS_WORKSPACE_URL: ${DATABRICKS_WORKSPACE_URL:-}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
      DATABRICKS_ROOT_PATH: ${DATABRICKS_ROOT_PATH:-/Users}
    restart: unless-stopped
